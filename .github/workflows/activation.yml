name: Unity Activation File (one-time)

# Unity Personal 라이선스 .alf 발급용. 1회 수동 실행.
#  실행 → 아티팩트(.alf) 다운로드 → https://license.unity3d.com/manual 업로드
#   → 받은 .ulf 전체 내용을 org Secret 'UNITY_LICENSE' 에 저장. 이후 다시 안 돌려도 됨.

on:
  workflow_dispatch: {}

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - id: alf
        uses: game-ci/unity-request-activation-file@v2
      - uses: actions/upload-artifact@v4
        with:
          name: Manual Activation File
          path: ${{ steps.alf.outputs.filePath }}
